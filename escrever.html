<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Envio - Pager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h2 { margin-top: 0; color: #00ff80; text-align: center; }
        textarea {
            width: 100%;
            height: 160px;
            background: #0d0d0d;
            border: 1px solid #00ff80;
            border-radius: 8px;
            color: #00ff80;
            padding: 12px;
            font-size: 1.1em;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00ff80;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background: #00cc66; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enviar para o Pager</h2>
        <textarea id="msgInput" placeholder="Escreva a mensagem aqui..."></textarea>
        <button onclick="enviarMensagem()">ENVIAR MENSAGEM</button>
    </div>

    <script>
        const input = document.getElementById('msgInput');

        // Carrega a mensagem atual ao abrir
        input.value = localStorage.getItem('pagerLoveMessage') || '';

        function enviarMensagem() {
            localStorage.setItem('pagerLoveMessage', input.value);
            alert("✅ Mensagem enviada para o Pager!");
        }
    </script>
</body>
</html>
