<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Envio - Pager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h2 { margin-top: 0; color: #00ff80; text-align: center; }
        textarea {
            width: 100%;
            height: 140px;
            background: #0d0d0d;
            border: 1px solid #00ff80;
            border-radius: 8px;
            color: #00ff80;
            padding: 12px;
            font-size: 1.1em;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-send { background: #00ff80; color: #000; }
        .btn-send:hover { background: #00cc66; }
        .btn-clear { background: #333; color: #ff5555; border: 1px solid #ff5555; }
        .btn-clear:hover { background: #441111; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enviar para o Pager</h2>
        <textarea id="msgInput" placeholder="Escreva a mensagem aqui..."></textarea>
        <div class="btn-group">
            <button class="btn-send" onclick="enviarMensagem()">ENVIAR</button>
            <button class="btn-clear" onclick="limparHistorico()">LIMPAR CHAT</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('msgInput');

        function enviarMensagem() {
            const text = input.value.trim();
            if (!text) return;

            const messages = JSON.parse(localStorage.getItem('pagerChatHistory') || '[]');
            const now = new Date();
            const dateStr = now.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
            const timeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

            messages.push({ text: text, date: dateStr, time: timeStr });
            localStorage.setItem('pagerChatHistory', JSON.stringify(messages));

            input.value = '';
        }

        function limparHistorico() {
            if (confirm("Apagar todas as mensagens do Pager?")) {
                localStorage.removeItem('pagerChatHistory');
            }
        }
    </script>
</body>
</html>
