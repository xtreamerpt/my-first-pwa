<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PAGER 1997</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        .pager {
            width: 340px;
            max-width: 95vw;
            background: linear-gradient(#222, #1a1a1a);
            border: 14px solid #333;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8),
                        inset 0 0 30px rgba(0,255,80,0.1);
            padding: 20px 15px;
            position: relative;
        }

        .screen {
            background: #001a00;
            border: 6px solid #0f0;
            border-radius: 8px;
            height: 380px;
            padding: 15px;
            color: #00ff80;
            font-size: 1.35em;
            line-height: 1.4;
            overflow-y: auto;
            box-shadow: inset 0 0 25px rgba(0,255,100,0.6);
            position: relative;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        .screen-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-block {
            border-bottom: 1px dashed #005522;
            padding-bottom: 8px;
        }

        .msg-block:last-child {
            border-bottom: none;
        }

        .msg-header {
            font-size: 0.85em;
            color: #00cc66;
            margin-bottom: 2px;
        }

        .msg-body {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            color: #006633;
            text-align: center;
            margin-top: 140px;
        }

        .header {
            text-align: center;
            color: #00ff80;
            margin-bottom: 12px;
            font-size: 1.4em;
            text-shadow: 0 0 10px #0f0;
        }

        .status {
            font-size: 0.9em;
            color: #00cc66;
            text-align: right;
            margin-bottom: 8px;
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .footer {
            text-align: center;
            color: #006633;
            font-size: 0.9em;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="pager">
        <div class="header">● PAGER 1997 ●</div>
        <div class="status">SIGNAL: STRONG <span class="blink">●</span></div>

        <div class="screen" id="screen">
            <div class="screen-content" id="display"></div>
        </div>

        <div class="footer">BATTERY: 87% • MEMORY: 8KB FREE</div>
    </div>

    <script>
        const display = document.getElementById('display');
const screen = document.getElementById('screen');

function renderMessages() {
    const messages = JSON.parse(localStorage.getItem('pagerChatHistory') || '[]');

    if (messages.length === 0) {
        display.innerHTML = '<div class="empty-state">SEM MENSAGENS...</div>';
        return;
    }

    display.innerHTML = messages.map(msg => `
        <div class="msg-block">
            <div class="msg-header">> ${msg.date} ${msg.time}</div>
            <div class="msg-body">${escapeHtml(msg.text)}</div>
        </div>
    `).join('');

    screen.scrollTop = screen.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

// 1. Atualização em tempo real (se ambos estiverem visíveis, ex: desktop ou ecrã dividido)
window.addEventListener('storage', (e) => {
    if (e.key === 'pagerChatHistory') renderMessages();
});

// 2. CORREÇÃO PARA MOBILE: Atualiza assim que altera de separador e volta ao Pager
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        renderMessages();
    }
});

// 3. Garante atualização ao focar a janela
window.addEventListener('focus', renderMessages);

// Inicializa
window.onload = renderMessages;
    </script>
</body>
</html>
