<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PAGER 1997</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        .pager {
            width: 340px;
            max-width: 95vw;
            background: linear-gradient(#222, #1a1a1a);
            border: 14px solid #333;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8),
                        inset 0 0 30px rgba(0,255,80,0.1);
            padding: 20px 15px;
            position: relative;
        }

        .screen {
            background: #001a00;
            border: 6px solid #0f0;
            border-radius: 8px;
            height: 380px;
            padding: 15px;
            color: #00ff80;
            font-size: 1.35em;
            line-height: 1.45;
            overflow-y: auto;
            box-shadow: inset 0 0 25px rgba(0,255,100,0.6);
            position: relative;
        }

        .screen-content {
            min-height: 100%;
            white-space: pre-wrap;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #00ff80;
            font-family: 'VT323', monospace;
            font-size: 1.35em;
            line-height: 1.45;
            resize: none;
            outline: none;
            position: absolute;
            top: 0;
            left: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            color: #00ff80;
            margin-bottom: 12px;
            font-size: 1.4em;
            text-shadow: 0 0 10px #0f0;
        }

        .status {
            font-size: 0.9em;
            color: #00cc66;
            text-align: right;
            margin-bottom: 8px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 18px;
            gap: 10px;
        }

        button {
            flex: 1;
            background: #222;
            color: #0f0;
            border: 3px solid #0f0;
            padding: 14px;
            font-family: 'VT323', monospace;
            font-size: 1.3em;
            cursor: pointer;
            box-shadow: 0 4px 0 #0a0;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0a0;
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .footer {
            text-align: center;
            color: #006633;
            font-size: 0.9em;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="pager">
        <div class="header">● PAGER 1997 ●</div>
        <div class="status">SIGNAL: STRONG <span class="blink">●</span></div>

        <div class="screen">
            <div class="screen-content" id="display">
                PARA: Meu Querido Amor<br>
                DATA: 22 JUL 2026<br>
                ──────────────────<br><br>
            </div>
            <textarea id="editor" spellcheck="false">Escreve aqui a tua mensagem de amor...</textarea>
        </div>

        <div class="buttons">
            <button onclick="saveMessage()">SALVAR MENSAGEM</button>
            <button onclick="clearMessage()">APAGAR</button>
        </div>

        <div class="footer">BATTERY: 87% • MEMORY: 8KB FREE</div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const display = document.getElementById('display');

        // Load saved message
        function loadMessage() {
            const saved = localStorage.getItem('pagerLoveMessage');
            if (saved) {
                editor.value = saved;
                updateDisplay();
            }
        }

        function updateDisplay() {
            display.innerHTML = `
                PARA: Meu Querido Amor<br>
                DATA: 22 JUL 2026<br>
                ──────────────────<br><br>
                ${editor.value.replace(/\n/g, '<br>')}
            `;
        }

        // Save message
        function saveMessage() {
            localStorage.setItem('pagerLoveMessage', editor.value);
            updateDisplay();
            alert("✅ Mensagem guardada no pager!");
        }

        function clearMessage() {
            if (confirm("Apagar toda a mensagem?")) {
                editor.value = "";
                localStorage.removeItem('pagerLoveMessage');
                updateDisplay();
            }
        }

        // Auto update display while typing
        editor.addEventListener('input', updateDisplay);

        // Initialize
        window.onload = loadMessage;
    </script>
</body>
</html>
